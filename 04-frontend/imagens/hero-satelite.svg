          <line x1="-44" y1="3" x2="-22" y2="3" stroke="#0B1A30" stroke-width=".5"></line>
          <line x1="22" y1="-3" x2="44" y2="-3" stroke="#0B1A30" stroke-width=".5"></line>
          <line x1="22" y1="3" x2="44" y2="3" stroke="#0B1A30" stroke-width=".5"></line>
          
          <line x1="0" y1="-12" x2="0" y2="-26" stroke="#E8B84B" stroke-width="1.5"></line>
          <circle cx="0" cy="-28" r="3" fill="#E8B84B"></circle>
